name: Build Flutter APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Passage en v4

      - name: Install Java
        uses: actions/setup-java@v4 # Passage en v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          cache: true # Optionnel : accélère les prochains builds

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4 # LA CORRECTION : Passage en v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
